    <meta property="og:title" content="AudiooBook — Textos em Áudio" />

    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AudiooBook — Textos em Áudio" />

  <body>
    <div id="app">

            <div class="logo-text">

      <main id="app-main">
        <section id="upload-area"></section>
        <section id="player-area" style="display:none"></section>
        <section id="progress-area" style="display:none"></section>
      </main>

      <footer id="app-footer">
        <div class="footer-inner">
          <span class="footer-badge">🔒 100% offline</span>
          <span class="footer-text">Nenhum arquivo é enviado para servidores</span>
