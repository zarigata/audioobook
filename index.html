<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e85d26" />
    <meta name="description" content="Transforme PDFs, EPUBs e textos em áudio — tudo no seu navegador, em português." />
    <title>AudiooBook — Transforme seus textos em áudio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header id="app-header">
        <div class="header-inner">
          <div class="logo">
            <span class="logo-icon">🎧</span>
            <div class="logo-text">
              <h1>AudiooBook</h1>
              <p>Transforme textos em áudio</p>
            </div>
          </div>
        </div>
      </header>

      <main id="app-main">
        <section id="upload-area"></section>
        <section id="player-area" style="display:none"></section>
        <section id="progress-area" style="display:none"></section>
      </main>

      <footer id="app-footer">
        <div class="footer-inner">
          <span class="footer-badge">🔒 100% offline</span>
          <span class="footer-text">Nenhum arquivo é enviado para servidores</span>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
