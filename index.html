<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AudiooBook — Transforme seus textos em áudio</title>
  </head>
  <body>
    <header>
      <h1>AudiooBook</h1>
      <p>Transforme seus textos em áudio</p>
    </header>
    <main>
      <section id="upload-area">
        <!-- Upload component will mount here -->
      </section>
      <section id="player-area" style="display:none">
        <!-- Player component will mount here -->
      </section>
      <section id="progress-area" style="display:none">
        <!-- Progress indicators will mount here -->
      </section>
    </main>
    <footer>
      <p>Tudo processado no seu navegador. Nenhum arquivo é enviado para servidores.</p>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
